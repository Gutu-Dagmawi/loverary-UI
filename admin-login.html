<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Loverary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      .spinner {
        width: 1.5rem;
        height: 1.5rem;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .hidden { display: none; }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col">
    <header class="bg-white border-b border-gray-100">
      <div class="max-w-5xl mx-auto px-4 py-4">
        <a href="index.html" class="flex items-center gap-2">
          <span class="text-2xl">📚</span>
          <span class="text-xl font-medium text-gray-900">Loverary Admin</span>
        </a>
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-sm space-y-8 mx-auto">
        <div class="text-center">
          <h2 class="text-2xl font-semibold text-gray-900">Admin Portal</h2>
          <p class="mt-1 text-sm text-gray-600">Please sign in to continue</p>
        </div>
        
        <form id="adminLoginForm" class="space-y-6" novalidate>
          <div class="space-y-4">
            <div>
              <label for="admin-email" class="block text-sm font-medium text-gray-700 mb-1">
                Admin Email
              </label>
              <input
                id="admin-email"
                name="email"
                type="email"
                required
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-gray-400"
                placeholder="admin@loverary.com"
              />
            </div>
            <div>
              <label for="admin-password" class="block text-sm font-medium text-gray-700 mb-1">
                Password
              </label>
              <input
                id="admin-password"
                name="password"
                type="password"
                required
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-gray-400"
                placeholder="••••••••"
              />
            </div>
          </div>

          <div>
            <button
              type="submit"
              id="loginButton"
              class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-gray-800 hover:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500"
            >
              <span id="buttonText">Sign in</span>
              <div id="spinner" class="spinner hidden ml-2"></div>
            </button>
          </div>
        </form>
      </div>
    </main>

    <script type="module">
      import { adminLogin } from './src/api/auth.js';
      
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('adminLoginForm');
        if (!form) return;
        
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const email = document.getElementById('admin-email')?.value;
          const password = document.getElementById('admin-password')?.value;
          const button = document.getElementById('loginButton');
          const buttonText = document.getElementById('buttonText');
          const spinner = document.getElementById('spinner');
          
          if (!email || !password || !button || !buttonText || !spinner) {
            console.error('Required elements not found');
            return;
          }
          
          // Show loading state
          button.disabled = true;
          buttonText.textContent = 'Signing in...';
          spinner.classList.remove('hidden');
          
          try {
            const formData = new FormData();
            formData.append('email', email);
            formData.append('password', password);
            
            const data = await adminLogin(formData);
            if (data && data.user && data.user.type === 'Admin') {
              console.log('Admin login successful, redirecting to dashboard');
              // Redirect to admin dashboard
              const redirectTo = sessionStorage.getItem('redirectAfterLogin') || 'admin-dashboard.html';
              window.location.href = redirectTo;
            } else {
              // Clear any partial data if user is not an admin
              localStorage.removeItem('adminToken');
              localStorage.removeItem('currentAdmin');
              throw new Error('Admin privileges required. Please use an admin account.');
            }
          } catch (error) {
            console.error('Login failed:', error);
            alert('Login failed. Please check your credentials and try again.');
          } finally {
            if (button && buttonText && spinner) {
              button.disabled = false;
              buttonText.textContent = 'Sign in';
              spinner.classList.add('hidden');
            }
          }
        });
      });
    </script>
  </body>
</html>
