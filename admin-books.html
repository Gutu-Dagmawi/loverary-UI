<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Books - Loverary Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      .sidebar {
        width: 250px;
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
      }
      .main-content {
        margin-left: 250px;
        padding: 2rem;
      }
      .nav-link {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        color: #4b5563;
        border-radius: 0.375rem;
        transition: all 0.15s ease;
      }
      .nav-link:hover {
        background-color: #f3f4f6;
        color: #111827;
      }
      .nav-link.active {
        background-color: #f3f4f6;
        color: #111827;
        font-weight: 500;
      }
      .nav-link i {
        margin-right: 0.75rem;
        width: 1.25rem;
        text-align: center;
      }
      .action-btn {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
        padding-top: 0.25rem;
        padding-bottom: 0.25rem;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 500;
        transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 150ms;
      }
      .edit-btn {
        background-color: #3b82f6;
        color: white;
      }
      .edit-btn:hover {
        background-color: #2563eb;
      }
      .delete-btn {
        background-color: #ef4444;
        color: white;
      }
      .delete-btn:hover {
        background-color: #dc2626;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <!-- Sidebar will be injected here by AdminSidebar.js -->
    <div id="admin-sidebar-container"></div>
    
    <script type="module">
      import { isAdmin, isAuthenticated } from './src/api/auth.js';
      import { initAdminSidebar } from './src/components/AdminSidebar.js';
      
      // Check if user is authenticated and is admin
      document.addEventListener('DOMContentLoaded', async () => {
        if (!isAuthenticated() || !isAdmin()) {
          console.log('User is not authenticated or not an admin. Redirecting to login...');
          // Store the current URL to redirect back after login
          sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
          window.location.href = 'login.html';
          return;
        }
        
        // Initialize the sidebar with 'books' as active
        initAdminSidebar('books');
      });
    </script>

    <!-- Main Content -->
    <div class="main-content">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800">Manage Books</h2>
        <a href="book-form.html" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md flex items-center">
          <i class="fas fa-plus mr-2"></i>
          Add New Book
        </a>
      </div>

      <!-- Books Table -->
      <div class="bg-white shadow rounded-lg overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Title</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Author</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Available Copies</th>
                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody id="booksTableBody" class="bg-white divide-y divide-gray-200">
              <!-- Books will be loaded here dynamically -->
            </tbody>
          </table>
        </div>
        <!-- Pagination -->
        <div id="paginationContainer" class="bg-white px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
          <!-- Pagination will be inserted here by JavaScript -->
        </div>
      </div>
    </div>

    <!-- SweetAlert2 for better alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
      import { isAdmin, isAuthenticated, getCsrfToken } from './src/api/auth.js';
      import { initAdminSidebar } from './src/components/AdminSidebar.js';
      
      // Toast notification function
      function showToast(message, type = 'info') {
        const toast = Swal.mixin({
          toast: true,
          position: 'top-end',
          showConfirmButton: false,
          timer: 3000,
          timerProgressBar: true,
          didOpen: (toast) => {
            toast.addEventListener('mouseenter', Swal.stopTimer);
            toast.addEventListener('mouseleave', Swal.resumeTimer);
          }
        });

        const iconMap = {
          success: 'success',
          error: 'error',
          warning: 'warning',
          info: 'info'
        };

        toast.fire({
          icon: iconMap[type] || 'info',
          title: message
        });
      }
      
      // API Base URL
      const API_BASE_URL = 'http://localhost:8000/api/';
      
      // Check if user is authenticated and is admin
      document.addEventListener('DOMContentLoaded', async () => {
        if (!isAuthenticated() || !isAdmin()) {
          console.log('User is not authenticated or not an admin. Redirecting to login...');
          sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
          window.location.href = 'login.html';
          return;
        }
        
        // Initialize the sidebar with 'books' as active
        initAdminSidebar('books');
        
        // Load books
        await loadBooks();
        
        // Set up event listeners
        setupEventListeners();
      });
      
      // Enhanced Author Cache with TTL (Time To Live)
      const authorCache = (() => {
        const cache = new Map();
        const TTL = 5 * 60 * 1000; // 5 minutes TTL
        
        // Get author from cache if exists and not expired
        function get(authorId) {
          const id = Number(authorId);
          if (!id || isNaN(id)) return null;
          
          const cached = cache.get(id);
          if (!cached) return null;
          
          // Check if cache entry is expired
          if (Date.now() - cached.timestamp > TTL) {
            cache.delete(id);
            return null;
          }
          
          return cached.data;
        }
        
        // Add author to cache
        function set(author) {
          if (!author) return;
          
          const id = author.id || author.author_id;
          if (!id) return;
          
          cache.set(Number(id), {
            data: author,
            timestamp: Date.now()
          });
          
          console.log(`Cached author ${id}:`, author.name || 'Unknown');
        }
        
        // Batch fetch multiple authors
        async function fetchAuthors(ids) {
          if (!ids || !ids.length) return [];
          
          // Get unique, valid IDs
          const allUniqueIds = [...new Set(ids)]
            .map(id => Number(id))
            .filter(id => id && !isNaN(id));
          
          if (allUniqueIds.length === 0) return [];
          
          // Get cached authors first
          const cachedAuthors = allUniqueIds
            .filter(id => has(id))
            .map(id => get(id));
            
          // Find uncached author IDs
          const uncachedIds = allUniqueIds.filter(id => !has(id));
          
          if (uncachedIds.length === 0) {
            // Return all from cache if nothing to fetch
            return allUniqueIds.map(id => get(id));
          }
          
          console.log('Fetching uncached authors:', uncachedIds);
          
          try {
            // Fetch only uncached authors
            const response = await fetch(`${API_BASE_URL}authors?ids=${uncachedIds.join(',')}`, {
              headers: {
                'Authorization': `Bearer ${localStorage.getItem('auth_token')}`,
                'Accept': 'application/json',
              },
              credentials: 'include'
            });
            
            if (response.ok) {
              const result = await response.json();
              const fetchedAuthors = Array.isArray(result) ? result : (result.data || []);
              
              // Cache all fetched authors
              fetchedAuthors.forEach(author => set(author));
              
              // Combine cached and newly fetched authors
              const allAuthors = allUniqueIds.map(id => get(id) || { id, name: 'Unknown Author' });
              return allAuthors;
            } else {
              console.error('Batch fetch failed, falling back to individual requests');
              throw new Error('Batch fetch failed');
            }
          } catch (error) {
            console.error('Batch fetch error, falling back to individual requests:', error);
            // Fall back to individual requests
            return Promise.all(uniqueIds.map(fetchAuthor));
          }
        }
        
        // Fetch a single author
        async function fetchAuthor(authorId) {
          const id = Number(authorId);
          if (!id || isNaN(id)) return { name: 'Unknown Author' };
          
          // Check cache first
          const cached = get(id);
          if (cached) return cached;
          
          try {
            const response = await fetch(`${API_BASE_URL}authors/${id}`, {
              headers: {
                'Authorization': `Bearer ${localStorage.getItem('auth_token')}`,
                'Accept': 'application/json',
              },
              credentials: 'include'
            });
            
            if (response.ok) {
              const author = await response.json();
              set(author);
              return author;
            } else {
              console.error(`Failed to fetch author ${id}:`, response.status);
              return { id, name: 'Unknown Author' };
            }
          } catch (error) {
            console.error(`Error fetching author ${id}:`, error);
            return { id, name: 'Unknown Author' };
          }
        }
        
        // Check if author exists in cache
        function has(authorId) {
          const id = Number(authorId);
          if (!id || isNaN(id)) return false;
          return cache.has(id) && (Date.now() - cache.get(id).timestamp <= TTL);
        }
        
        return {
          get,
          set,
          has,
          fetchAuthor,
          fetchAuthors
        };
      })();
      
      // Alias for backward compatibility
      const fetchAuthor = authorCache.fetchAuthor.bind(authorCache);
      
      // Preload multiple authors efficiently
      async function preloadAuthors(authorIds) {
        if (!authorIds || !authorIds.length) return [];
        
        // Get unique, valid author IDs that aren't already in cache
        const uniqueIds = [...new Set(authorIds)]
          .map(id => Number(id))
          .filter(id => id && !isNaN(id) && !authorCache.has(id));
        
        if (uniqueIds.length === 0) return [];
        
        try {
          const authors = await authorCache.fetchAuthors(uniqueIds);
          console.log('Preloaded authors:', authors);
          return authors;
        } catch (error) {
          console.error('Error preloading authors:', error);
          return [];
        }
      }
      
      // Update just the author names in the UI
      function updateAuthorNames(books) {
        const booksTableBody = document.getElementById('booksTableBody');
        if (!booksTableBody) return;
        
        // Create a mapping of book IDs to their rows
        const rows = Array.from(booksTableBody.querySelectorAll('tr'));
        const bookRows = new Map();
        
        rows.forEach(row => {
          const bookId = row.getAttribute('data-book-id');
          if (bookId) {
            bookRows.set(bookId, row);
          }
        });
        
        // Update each book's author
        books.forEach(book => {
          const bookId = book.id || book.book_id;
          const authorId = book.author_id || (book.author && book.author.id);
          
          if (!bookId || !authorId) return;
          
          const row = bookRows.get(String(bookId));
          if (!row) return;
          
          // Find the author cell and update it
          const authorCell = row.querySelector('[data-author-cell]');
          if (authorCell) {
            const author = authorCache.get(Number(authorId));
            if (author) {
              authorCell.textContent = author.full_name || author.name || 'Unknown Author';
            }
          }
        });
      }
      
      // Load books from API
      async function loadBooks(page = 1) {
        try {
          // Show loading state
          const booksTableBody = document.getElementById('booksTableBody');
          booksTableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center">Loading books...</td></tr>';
          
          // Show loading state in pagination
          const paginationContainer = document.getElementById('paginationContainer');
          if (paginationContainer) {
            paginationContainer.innerHTML = '<div class="flex justify-center py-4"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div></div>';
          }
          
          // Initial render with skeleton loading
          renderBooks(Array(10).fill({ loading: true }));
          
          const response = await fetch(`${API_BASE_URL}books?page=${page}`, {
            headers: {
              'Authorization': `Bearer ${localStorage.getItem('auth_token')}`,
              'Accept': 'application/json',
              'X-Requested-With': 'XMLHttpRequest'
            },
            credentials: 'include'
          });
          
          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.message || `Failed to load books: ${response.statusText}`);
          }
          
          const responseData = await response.json();
          const books = responseData.data || [];
          const pagination = responseData.pagination || { current_page: 1, per_page: 10, total: 0 };
          
          if (!Array.isArray(books)) {
            throw new Error('Invalid response format: books data is not an array');
          }
          
          // Extract author IDs from books (checking both author_id and author.id)
          const authorIds = books
            .map(book => book.author_id || (book.author && book.author.id))
            .filter(Boolean);
            
          console.log('Author IDs to fetch:', authorIds);
          
          // Start preloading authors in the background
          if (authorIds.length > 0) {
            const currentPage = window.currentPage || 1;
            
            // Don't await here, let it happen in the background
            preloadAuthors(authorIds)
              .then(() => {
                // Only update if we're still on the same page
                if (document.readyState === 'complete' && (window.currentPage || 1) === currentPage) {
                  // Just update the author names without refetching books
                  updateAuthorNames(books);
                }
              })
              .catch(console.error);
          }
          
          // Process books with authors
          const booksWithAuthors = books.map(book => {
            const bookId = book.id || book.book_id;
            const authorId = book.author_id || (book.author && book.author.id);
            
            if (!authorId) {
              console.warn('Book has no author ID:', bookId, book.title);
              return { 
                ...book, 
                author: { name: 'Unknown Author' },
                author_name: 'Unknown Author'
              };
            }
            
            // If we have author data in the book object, cache it
            if (book.author) {
              authorCache.set(Number(authorId), book.author);
              return {
                ...book,
                author_name: book.author.full_name || book.author.name || 'Unknown Author'
              };
            }
            
            // Check cache
            if (authorCache.has(Number(authorId))) {
              const author = authorCache.get(Number(authorId));
              return { 
                ...book, 
                author: author,
                author_name: author.full_name || author.name || 'Unknown Author'
              };
            }
            
            // If we get here, the author isn't cached yet but will be loaded by preloadAuthors
            return { 
              ...book, 
              author: { id: authorId, name: 'Loading...' },
              author_name: 'Loading...' 
            };
          });
          
          // Store pagination state
          window.currentPage = pagination.current_page || 1;
          window.perPage = pagination.per_page || 10;
          window.totalItems = pagination.total || 0;
          window.totalPages = Math.ceil(window.totalItems / window.perPage) || 1;
          window.pagination = pagination;
          
          // Render books and pagination
          renderBooks(booksWithAuthors);
          renderPagination();
          
        } catch (error) {
          console.error('Error loading books:', error);
          const booksTableBody = document.getElementById('booksTableBody');
          booksTableBody.innerHTML = `
            <tr>
              <td colspan="6" class="px-6 py-4 text-center text-red-600">
                Error loading books: ${error.message}
              </td>
            </tr>
          `;
        }
      }
      
      // Render pagination controls
      function renderPagination() {
        const paginationContainer = document.getElementById('paginationContainer');
        if (!paginationContainer) return;
        
        const { currentPage, totalPages, totalItems, perPage } = window;
        
        if (totalPages <= 1) {
          paginationContainer.innerHTML = `
            <div class="px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
              <div class="flex-1 flex justify-between sm:hidden"></div>
              <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                <div>
                  <p class="text-sm text-gray-700">
                    Showing <span class="font-medium">1</span> to <span class="font-medium">${totalItems}</span> of{' '}
                    <span class="font-medium">${totalItems}</span> results
                  </p>
                </div>
              </div>
            </div>`;
          return;
        }
        
        // Calculate the range of items being shown
        const startItem = (currentPage - 1) * perPage + 1;
        const endItem = Math.min(currentPage * perPage, totalItems);
        
        let paginationHtml = `
          <div class="px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
            <div class="flex-1 flex justify-between sm:hidden">
              ${currentPage > 1 ? `
                <button onclick="loadBooks(${currentPage - 1})" 
                  class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                  Previous
                </button>
              ` : '<span></span>'}
              ${currentPage < totalPages ? `
                <button onclick="loadBooks(${currentPage + 1})" 
                  class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                  Next
                </button>
              ` : '<span></span>'}
            </div>
            <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
              <div>
                <p class="text-sm text-gray-700">
                  Showing <span class="font-medium">${startItem}</span> to 
                  <span class="font-medium">${endItem}</span> of 
                  <span class="font-medium">${totalItems}</span> results
                </p>
              </div>
              <div>
                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                  ${currentPage > 1 ? `
                    <button onclick="loadBooks(${currentPage - 1})" 
                      class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"
                      ${currentPage === 1 ? 'disabled cursor-not-allowed opacity-50' : ''}
                    >
                      <span class="sr-only">Previous</span>
                      <i class="fas fa-chevron-left h-4 w-4"></i>
                    </button>
                  ` : ''}
                  
                  ${Array.from({ length: Math.min(5, totalPages) }, (_, i) => {
                    let pageNum;
                    if (totalPages <= 5) {
                      pageNum = i + 1;
                    } else if (currentPage <= 3) {
                      pageNum = i + 1;
                    } else if (currentPage >= totalPages - 2) {
                      pageNum = totalPages - 4 + i;
                    } else {
                      pageNum = currentPage - 2 + i;
                    }
                    
                    // Skip if we've already shown this page number
                    if (i > 0 && pageNum <= currentPage - 3) {
                      return '';
                    }
                    // Show ellipsis before first page if needed
                    if (i === 0 && currentPage > 3) {
                      return `
                        <button onclick="loadBooks(1)" class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">
                          1
                        </button>
                        <span class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700">
                          ...
                        </span>
                      `;
                    }
                    
                    // Show ellipsis after last page if needed
                    if (i === 4 && currentPage < totalPages - 2) {
                      return `
                        <span class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700">
                          ...
                        </span>
                        <button onclick="loadBooks(${totalPages})" class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">
                          ${totalPages}
                        </button>
                      `;
                    }
                    
                    return `
                      <button onclick="loadBooks(${pageNum})"
                        class="relative inline-flex items-center px-4 py-2 border ${
                          pageNum === currentPage 
                            ? 'z-10 bg-blue-50 border-blue-500 text-blue-600 font-semibold' 
                            : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'
                        } text-sm font-medium">
                        ${pageNum}
                      </button>
                    `;
                  }).join('')}
                
                ${currentPage < totalPages ? `
                  <button onclick="loadBooks(${currentPage + 1})" 
                    class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"
                    ${currentPage === totalPages ? 'disabled cursor-not-allowed opacity-50' : ''}>
                    <span class="sr-only">Next</span>
                    <i class="fas fa-chevron-right h-4 w-4"></i>
                  </button>
                ` : ''}
              </nav>
            </div>
          </div>
        `;
        
        paginationContainer.innerHTML = paginationHtml;
        
        // Update URL without page reload
        const url = new URL(window.location);
        if (currentPage > 1) {
          url.searchParams.set('page', currentPage);
        } else {
          url.searchParams.delete('page');
        }
        window.history.pushState({}, '', url);
      }
      
      // Render books in the table
      function renderBooks(books) {
        const booksTableBody = document.getElementById('booksTableBody');
        
        if (!books || !Array.isArray(books) || books.length === 0) {
          booksTableBody.innerHTML = `
            <tr>
              <td colspan="6" class="px-6 py-4 text-center text-gray-500">
                No books found. Click "Add New Book" to get started.
              </td>
            </tr>
          `;
          return;
        }
        
        // Check if we're showing loading state
        if (books[0] && books[0].loading) {
          booksTableBody.innerHTML = Array(10).fill().map(() => `
            <tr class="animate-pulse">
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center">
                  <div class="flex-shrink-0 h-16 w-12 mr-3 bg-gray-200 rounded"></div>
                  <div>
                    <div class="h-4 bg-gray-200 rounded w-32 mb-2"></div>
                    <div class="h-3 bg-gray-100 rounded w-24"></div>
                  </div>
                </div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="h-4 bg-gray-200 rounded w-24"></div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="h-6 w-6 bg-gray-200 rounded-full"></div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <div class="h-8 w-16 bg-gray-200 rounded"></div>
              </td>
            </tr>
          `).join('');
          return;
        }
        
        booksTableBody.innerHTML = books.map(book => {
          const bookId = book.id || book.book_id;
          if (!bookId) {
            console.error('Book is missing ID:', book);
            return '';
          }
          
          const authorId = book.author_id || (book.author && book.author.id);
          const author = authorId ? authorCache.get(Number(authorId)) : null;
          
          return `
            <tr data-book-id="${bookId}">
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center">
                  <div class="flex-shrink-0 h-14 w-10">
                    ${book.cover_image_url ? 
                      `<img 
                        class="h-full w-full rounded-md object-cover" 
                        src="${book.cover_image_url.startsWith('http') ? '' : 'http://localhost:8000'}${book.cover_image_url}" 
                        alt="${book.title || 'Book cover'}"
                        onerror="this.onerror=null; this.src='https://via.placeholder.com/40x56?text=No+Cover';"
                      >` : 
                      `<div class="h-full w-full rounded-md bg-gray-200 flex items-center justify-center">
                        <i class="fas fa-book text-gray-400"></i>
                      </div>`
                    }
                  </div>
                  <div class="ml-4">
                    <div class="text-sm font-medium text-gray-900">${book.title || 'No title'}</div>
                    <div class="text-sm text-gray-500">${book.isbn || 'No ISBN'}</div>
                  </div>
                </div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap" data-author-cell>
                <div class="text-sm text-gray-900">
                  ${author ? (author.full_name || author.name || 'Unknown Author') : 'Loading...'}
                </div>
                <div class="text-sm text-gray-500">${book.publication_year || ''}</div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
                ${book.book_copies ? `
                  <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
                    ${book.book_copies.some(copy => copy.is_available) ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                    ${book.book_copies.filter(copy => copy.is_available).length} of ${book.book_copies.length} available
                  </span>
                ` : '<span class="text-gray-500 text-sm">No copies</span>'}
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <a href="book-form.html?id=${bookId}" class="text-blue-600 hover:text-blue-900 mr-3">
                  <i class="fas fa-edit"></i> Edit
                </a>
                <button onclick="window.handleDeleteBook(event, ${bookId})" class="text-red-600 hover:text-red-900">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </td>
            </tr>
          `;
        }).join('');
      }
      

      
      // Set up event listeners
      function setupEventListeners() {
        // Search functionality
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
          let searchTimeout;
          searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const searchTerm = e.target.value.trim();
            searchTimeout = setTimeout(() => {
              loadBooks(1); // Reset to first page when searching
            }, 500);
          });
        }
      }
      
      // Make functions available globally
      window.loadBooks = loadBooks;
      
      // Make deleteBook function available globally for inline event handlers
      // Handle book deletion with confirmation
      window.handleDeleteBook = async function(event, bookId) {
        event.preventDefault();
        event.stopPropagation();
        
        if (!bookId) {
          console.error('No book ID provided for deletion');
          showToast('Error: No book ID provided', 'error');
          return;
        }

        try {
          // Show confirmation dialog
          const result = await Swal.fire({
            title: 'Delete Book',
            text: 'Are you sure you want to delete this book? This action cannot be undone.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Yes, delete it!',
            cancelButtonText: 'Cancel',
            reverseButtons: true,
            customClass: {
              confirmButton: 'px-4 py-2 rounded-md',
              cancelButton: 'px-4 py-2 rounded-md mr-2'
            }
          });

          if (!result.isConfirmed) {
            return;
          }

          // Get CSRF token
          const csrfToken = await getCsrfToken();
          const authToken = localStorage.getItem('auth_token');
          
          if (!authToken) {
            throw new Error('Not authenticated. Please log in again.');
          }

          // Get the button that was clicked
          const deleteButton = event.target.closest('button');
          const originalButtonHTML = deleteButton?.innerHTML || '';
          
          // Update button to show loading state
          if (deleteButton) {
            deleteButton.disabled = true;
            deleteButton.innerHTML = `
              <i class="fas fa-spinner fa-spin mr-2"></i>
              Deleting...
            `;
          }

          // Make the delete request
          const response = await fetch(`${API_BASE_URL}books/${bookId}`, {
            method: 'DELETE',
            headers: {
              'Authorization': `Bearer ${authToken}`,
              'Accept': 'application/json',
              'X-XSRF-TOKEN': csrfToken,
              'X-Requested-With': 'XMLHttpRequest'
            },
            credentials: 'include'
          });
          
          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.message || `Failed to delete book: ${response.statusText}`);
          }
          
          // Show success message
          await Swal.fire({
            title: 'Deleted!',
            text: 'The book has been deleted.',
            icon: 'success',
            timer: 2000,
            showConfirmButton: false
          });
          
          // Reload the books list but stay on the same page
          await loadBooks(window.currentPage || 1);
          
        } catch (error) {
          console.error('Error deleting book:', error);
          
          // Show error message
          await Swal.fire({
            title: 'Error',
            text: error.message || 'Failed to delete book',
            icon: 'error',
            confirmButtonText: 'OK'
          });
          
          // Re-enable the delete button if it exists
          const deleteButton = event.target.closest('button');
          if (deleteButton) {
            deleteButton.disabled = false;
            deleteButton.innerHTML = originalButtonHTML;
          }
        }
      };
    </script>
  </body>
</html>
