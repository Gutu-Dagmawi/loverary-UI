<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Books - Loverary Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      .sidebar {
        width: 250px;
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
      }
      .main-content {
        margin-left: 250px;
        padding: 2rem;
      }
      .nav-link {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        color: #4b5563;
        border-radius: 0.375rem;
        transition: all 0.15s ease;
      }
      .nav-link:hover {
        background-color: #f3f4f6;
        color: #111827;
      }
      .nav-link.active {
        background-color: #f3f4f6;
        color: #111827;
        font-weight: 500;
      }
      .nav-link i {
        margin-right: 0.75rem;
        width: 1.25rem;
        text-align: center;
      }
      .action-btn {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
        padding-top: 0.25rem;
        padding-bottom: 0.25rem;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 500;
        transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 150ms;
      }
      .edit-btn {
        background-color: #3b82f6;
        color: white;
      }
      .edit-btn:hover {
        background-color: #2563eb;
      }
      .delete-btn {
        background-color: #ef4444;
        color: white;
      }
      .delete-btn:hover {
        background-color: #dc2626;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <!-- Sidebar will be injected here by AdminSidebar.js -->
    <div id="admin-sidebar-container"></div>
    
    <script type="module">
      import { isAdmin, isAuthenticated } from './src/api/auth.js';
      import { initAdminSidebar } from './src/components/AdminSidebar.js';
      
      // Check if user is authenticated and is admin
      document.addEventListener('DOMContentLoaded', async () => {
        if (!isAuthenticated() || !isAdmin()) {
          console.log('User is not authenticated or not an admin. Redirecting to login...');
          // Store the current URL to redirect back after login
          sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
          window.location.href = 'login.html';
          return;
        }
        
        // Initialize the sidebar with 'books' as active
        initAdminSidebar('books');
      });
    </script>

    <!-- Main Content -->
    <div class="main-content">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800">Manage Books</h2>
        <button id="addBookBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md flex items-center">
          <i class="fas fa-plus mr-2"></i>
          Add New Book
        </button>
      </div>

      <!-- Books Table -->
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cover</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Title</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Author</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stock</th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody id="booksTableBody" class="bg-white divide-y divide-gray-200">
              <!-- Books will be loaded here dynamically -->
              <tr>
                <td colspan="6" class="px-6 py-4 text-center text-gray-500">
                  Loading books...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Book Modal (Hidden by default) -->
    <div id="bookModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-start py-8 justify-center hidden overflow-y-auto">
      <div class="bg-white rounded-lg w-full max-w-2xl max-h-[90vh] flex flex-col">
        <!-- Modal Header -->
        <div class="flex justify-between items-center p-4 border-b sticky top-0 bg-white z-10">
          <h3 class="text-lg font-medium text-gray-900" id="modalTitle">Add New Book</h3>
          <button id="closeModal" class="text-gray-400 hover:text-gray-500">
            <i class="fas fa-times"></i>
          </button>
        </div>
        
        <!-- Scrollable Content -->
        <div class="overflow-y-auto p-4 flex-1">
        <form id="bookForm" class="space-y-3 text-sm" enctype="multipart/form-data">
          <input type="hidden" id="bookId" name="id">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <!-- Required Fields -->
            <div class="md:col-span-2">
              <label for="title" class="block text-xs font-medium text-gray-700 mb-0.5">Title *</label>
              <input type="text" id="title" name="title" required maxlength="255" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-8">
            </div>
            
            <div>
              <label for="isbn" class="block text-xs font-medium text-gray-700 mb-0.5">ISBN *</label>
              <input type="text" id="isbn" name="isbn" required maxlength="20" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-8">
              <p class="mt-0.5 text-xs text-gray-500">Unique book identifier</p>
            </div>
            
            <div>
              <label for="author_id" class="block text-xs font-medium text-gray-700 mb-0.5">Author ID</label>
              <input type="number" id="author_id" name="author_id" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-8">
              <p class="mt-0.5 text-xs text-gray-500">Optional</p>
            </div>
            
            <div>
              <label for="category" class="block text-xs font-medium text-gray-700 mb-0.5">Category *</label>
              <input type="text" id="category" name="category" required maxlength="255" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-8">
            </div>
            
            <div>
              <label for="language" class="block text-xs font-medium text-gray-700 mb-0.5">Language *</label>
              <input type="text" id="language" name="language" required maxlength="255" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-8">
            </div>
            
            <div>
              <label for="pages" class="block text-xs font-medium text-gray-700 mb-0.5">Pages *</label>
              <input type="number" id="pages" name="pages" required min="1" max="10000" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-8">
            </div>
            
            <div>
              <label for="publication_year" class="block text-xs font-medium text-gray-700 mb-0.5">Publication Year</label>
              <input type="number" id="publication_year" name="publication_year" min="1000" max="2026" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-8">
              <p class="mt-0.5 text-xs text-gray-500">1000-2026</p>
            </div>
            
            <div class="flex items-center">
              <input type="checkbox" id="availability_status" name="availability_status" class="h-3.5 w-3.5 text-blue-600 focus:ring-blue-500 border-gray-300 rounded" checked>
              <label for="availability_status" class="ml-2 block text-xs text-gray-700">Available</label>
            </div>
            
            <div>
              <label for="publisher" class="block text-xs font-medium text-gray-700 mb-0.5">Publisher</label>
              <input type="text" id="publisher" name="publisher" maxlength="255" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-8">
            </div>
            
            <div>
              <label for="edition" class="block text-xs font-medium text-gray-700 mb-0.5">Edition</label>
              <input type="text" id="edition" name="edition" maxlength="255" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-8">
            </div>
            
            <!-- Summary -->
            <div class="md:col-span-2">
              <label for="summary" class="block text-xs font-medium text-gray-700 mb-0.5">Summary</label>
              <textarea id="summary" name="summary" rows="2" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"></textarea>
            </div>
            
            <!-- Book Copies Section -->
            <div class="md:col-span-2 border-t pt-3 mt-1">
              <div class="flex justify-between items-center mb-2">
                <h4 class="text-xs font-medium text-gray-700">Book Copies *</h4>
                <button type="button" id="addCopyBtn" class="inline-flex items-center px-2 py-1 border border-transparent text-xs font-medium rounded text-blue-700 bg-blue-100 hover:bg-blue-200 focus:outline-none focus:ring-1 focus:ring-blue-500">
                  <i class="fas fa-plus mr-1 text-xs"></i> Add Copy
                </button>
              </div>
              
              <div id="bookCopiesContainer" class="space-y-2">
                <!-- Book copy template -->
                <div class="book-copy border p-2 rounded text-xs">
                  <div class="flex justify-between items-center mb-1">
                    <span class="font-medium">Copy #1</span>
                    <button type="button" class="remove-copy text-red-500 hover:text-red-700">
                      <i class="fas fa-times"></i>
                    </button>
                  </div>
                  <div class="grid grid-cols-3 gap-2">
                    <div>
                      <label class="block text-xs text-gray-600 mb-0.5">Barcode *</label>
                      <input type="text" name="book_copies[0][barcode]" required maxlength="100" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-7">
                    </div>
                    <div>
                      <label class="block text-xs text-gray-600 mb-0.5">Condition</label>
                      <input type="text" name="book_copies[0][condition]" maxlength="255" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-7">
                    </div>
                    <div>
                      <label class="block text-xs text-gray-600 mb-0.5">Location</label>
                      <input type="text" name="book_copies[0][location]" maxlength="255" class="text-xs block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 h-7">
                    </div>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- Cover Image -->
            <div class="md:col-span-2 border-t pt-3">
              <label for="cover_image" class="block text-xs font-medium text-gray-700 mb-0.5">Cover Image</label>
              <div class="flex items-center">
                <input type="file" id="cover_image" name="cover_image" accept="image/jpg,image/jpeg,image/png" class="block w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
              </div>
              <p class="mt-0.5 text-xs text-gray-500">JPG/JPEG/PNG (max 2MB)</p>
            </div>
          </div>
        </div>
        
        <!-- Modal Footer -->
        <div class="p-4 border-t bg-gray-50 sticky bottom-0">
          <div class="flex justify-end space-x-3">
            <button type="button" id="cancelBtn" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100">
              Cancel
            </button>
            <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
              Save Book
            </button>
          </div>
        </div>
        </form>
      </div>
    </div>

    <script src="src/js/admin-books.js" type="module"></script>
  </body>
</html>
