<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Book - Loverary Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body class="bg-gray-100">
    <div class="flex h-screen">
      <!-- Sidebar -->
      <div class="w-64 bg-gray-800 text-white p-4">
        <h1 class="text-2xl font-bold mb-8">Loverary Admin</h1>
        <nav>
          <a href="admin-dashboard.html" class="block py-2 px-4 rounded hover:bg-gray-700 mb-2"
            >Dashboard</a
          >
          <a href="admin-books.html" class="block py-2 px-4 rounded bg-gray-700 mb-2">Books</a>
          <a href="#" class="block py-2 px-4 rounded hover:bg-gray-700 mb-2">Users</a>
          <a href="#" class="block py-2 px-4 rounded hover:bg-gray-700 mb-2">Loans</a>
          <a href="#" class="block py-2 px-4 rounded hover:bg-gray-700">Settings</a>
        </nav>
      </div>

      <!-- Main Content -->
      <div class="flex-1 p-8 overflow-auto">
        <div class="max-w-4xl mx-auto bg-white rounded-lg shadow p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Edit Book</h2>
            <a href="admin-books.html" class="text-gray-600 hover:text-gray-800">
              <i class="fas fa-times text-2xl"></i>
            </a>
          </div>

          <form id="bookForm" class="space-y-6">
            <input type="hidden" id="bookId" />

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Title *</label>
                <input
                  type="text"
                  id="title"
                  name="title"
                  required
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
              </div>

              <div>
                <label for="isbn" class="block text-sm font-medium text-gray-700">ISBN</label>
                <input
                  type="text"
                  id="isbn"
                  name="isbn"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
              </div>

              <div>
                <label for="author_id" class="block text-sm font-medium text-gray-700"
                  >Author ID *</label
                >
                <input
                  type="text"
                  id="author_id"
                  name="author_id"
                  required
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
              </div>

              <div>
                <label for="category" class="block text-sm font-medium text-gray-700"
                  >Category</label
                >
                <input
                  type="text"
                  id="category"
                  name="category"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
              </div>

              <div>
                <label for="language" class="block text-sm font-medium text-gray-700"
                  >Language</label
                >
                <input
                  type="text"
                  id="language"
                  name="language"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
              </div>

              <div>
                <label for="pages" class="block text-sm font-medium text-gray-700">Pages</label>
                <input
                  type="number"
                  id="pages"
                  name="pages"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
              </div>

              <div>
                <label for="publication_year" class="block text-sm font-medium text-gray-700"
                  >Publication Year</label
                >
                <input
                  type="number"
                  id="publication_year"
                  name="publication_year"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
              </div>

              <div class="flex items-center">
                <input
                  type="checkbox"
                  id="availability_status"
                  name="availability_status"
                  class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
                />
                <label for="availability_status" class="ml-2 block text-sm text-gray-700"
                  >Available</label
                >
              </div>

              <div>
                <label for="publisher" class="block text-sm font-medium text-gray-700"
                  >Publisher</label
                >
                <input
                  type="text"
                  id="publisher"
                  name="publisher"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
              </div>

              <div>
                <label for="edition" class="block text-sm font-medium text-gray-700">Edition</label>
                <input
                  type="text"
                  id="edition"
                  name="edition"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
              </div>

              <div class="md:col-span-2">
                <label for="summary" class="block text-sm font-medium text-gray-700">Summary</label>
                <textarea
                  id="summary"
                  name="summary"
                  rows="3"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                ></textarea>
              </div>

              <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700">Cover Image</label>
                <div class="mt-1 flex items-center">
                  <input
                    type="file"
                    id="cover_image"
                    name="cover_image"
                    accept="image/*"
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                  />
                </div>
                <div id="currentCover" class="mt-2">
                  <!-- Current cover image will be shown here -->
                </div>
              </div>
            </div>

            <!-- Book Copies Section -->
            <div class="border-t border-gray-200 pt-6">
              <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-medium">Book Copies</h3>
                <button
                  type="button"
                  id="addCopyBtn"
                  class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                >
                  <i class="fas fa-plus mr-1"></i> Add Copy
                </button>
              </div>
              <div id="bookCopiesContainer" class="space-y-4">
                <!-- Book copies will be added here -->
              </div>
            </div>

            <div class="flex justify-between pt-6 border-t border-gray-200">
              <button
                type="button"
                id="deleteBookBtn"
                class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500"
              >
                <i class="fas fa-trash mr-2"></i> Delete Book
              </button>
              <div class="space-x-3">
                <a
                  href="admin-books.html"
                  class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                >
                  Cancel
                </a>
                <button
                  type="submit"
                  class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                >
                  Update Book
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="./dist/js/admin-books.js"></script>
    <script>
      // Get book ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const bookId = urlParams.get('id');

      // Initialize the page with the book data
      if (bookId) {
        document.addEventListener('DOMContentLoaded', () => {
          // Load book data and populate the form
          openModal(bookId);
        });
      }
    </script>
  </body>
</html>
