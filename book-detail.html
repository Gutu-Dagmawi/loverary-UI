<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details | Loverary</title>
    <link href="./src/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-xl font-bold text-indigo-600">Loverary</a>
                </div>
                <div class="hidden sm:ml-6 sm:flex sm:items-center space-x-4">
                    <a href="index.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2 text-sm font-medium">Home</a>
                    <a href="profile.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2 text-sm font-medium">Profile</a>
                    <button id="logout-btn" class="text-gray-700 hover:text-indigo-600 px-3 py-2 text-sm font-medium">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Book Detail Section -->
    <main class="py-12 bg-gray-50 min-h-screen">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Back Button -->
            <button onclick="window.history.back()" class="mb-6 flex items-center text-indigo-600 hover:text-indigo-800 transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Books
            </button>

            <!-- Book Card -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                <div class="flex flex-col p-6 md:p-8">
                    <!-- Main Content Row -->
                    <div class="flex flex-col md:flex-row gap-8 mb-8">
                        <!-- Book Cover Column -->
                        <div class="md:w-1/3 flex justify-center md:justify-start">
                            <div class="w-48 h-72 bg-white rounded-lg shadow-sm overflow-hidden">
                                <img id="book-cover" 
                                     class="w-full h-full object-contain p-3" 
                                     src="https://via.placeholder.com/200x300?text=No+Cover" 
                                     alt="Book cover"
                                     onerror="this.src='https://via.placeholder.com/200x300?text=Cover+Not+Available';">
                            </div>
                        </div>
                        
                        <!-- Book Details Column -->
                        <div class="md:w-2/3">
                            <div class="space-y-6">
                                <!-- Header -->
                                <div class="space-y-2">
                                    <div id="book-category" class="text-xs font-medium text-indigo-600 uppercase tracking-wider">
                                        Category
                                    </div>
                                    <h1 id="book-title" class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">Book Title</h1>
                                    <p id="book-author" class="text-gray-600">By <span class="text-gray-800 font-medium">Author Name</span></p>
                                </div>
                                
                                <!-- Meta Grid -->
                                <div class="grid grid-cols-2 gap-4 py-2">
                                    <div class="space-y-1">
                                        <span class="text-xs text-gray-500">Published</span>
                                        <p id="publish-date" class="text-gray-900">2023</p>
                                    </div>
                                    <div class="space-y-1">
                                        <span class="text-xs text-gray-500">Pages</span>
                                        <p id="page-count" class="text-gray-900">320</p>
                                    </div>
                                    <div class="space-y-1">
                                        <span class="text-xs text-gray-500">Language</span>
                                        <p id="language" class="text-gray-900">English</p>
                                    </div>
                                    <div class="space-y-1">
                                        <span class="text-xs text-gray-500">ISBN</span>
                                        <p id="isbn" class="font-mono text-sm text-gray-600">978-1234567890</p>
                                    </div>
                                </div>
                                
                                <!-- Description -->
                                <div class="pt-2">
                                    <h2 class="text-lg font-medium text-gray-900 mb-2">About</h2>
                                    <div id="book-description" class="text-gray-600 leading-relaxed">
                                        <p>Loading book description...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Full Width Action Buttons Row -->
                    <div class="pt-6 border-t border-gray-100">
                        <div class="flex flex-col sm:flex-row gap-3 max-w-2xl mx-auto w-full">
                            <button id="checkout-btn" class="flex-1 bg-gray-900 hover:bg-gray-800 text-white px-6 py-3 rounded-lg font-medium text-sm transition-colors flex items-center justify-center space-x-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                </svg>
                                <span>Check Out</span>
                            </button>
                            <button id="add-to-shelf" class="flex-1 bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 px-6 py-3 rounded-lg font-medium text-sm transition-colors flex items-center justify-center space-x-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                </svg>
                                <span>Add to Shelf</span>
                            </button>
                        </div>
                        
                        <!-- Availability Status -->
                        <div id="availability-status" class="mt-4 text-sm text-center">
                            <!-- Will be filled by JavaScript -->
                        </div>
                    </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white mt-12 border-t border-gray-200">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
            <p class="text-center text-gray-500 text-sm">
                &copy; 2023 Loverary. All rights reserved.
            </p>
        </div>
    </footer>

    <script type="module" src="/src/index.js"></script>
    <script>

        // Add to Shelf functionality
        document.getElementById('add-to-shelf')?.addEventListener('click', async () => {
            try {
                const bookId = new URLSearchParams(window.location.search).get('id');
                if (!bookId) throw new Error('No book ID found');
                
                const response = await fetch(`http://localhost:8000/api/books/${bookId}/add-to-shelf`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('auth_token') || ''}`
                    }
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to add to shelf');
                }
                
                alert('Book added to your shelf!');
            } catch (error) {
                console.error('Error adding to shelf:', error);
                alert(error.message || 'Failed to add book to shelf. Please try again.');
            }
        });

        // Read Now functionality
        document.getElementById('read-now')?.addEventListener('click', () => {
            const bookId = new URLSearchParams(window.location.search).get('id');
            if (bookId) {
                window.location.href = `read.html?bookId=${bookId}`;
            } else {
                alert('Error: Book ID not found');
            }
        });

        // Logout functionality
        document.getElementById('logout-btn')?.addEventListener('click', () => {
            localStorage.removeItem('auth_token');
            window.location.href = 'login.html';
        });

        // Helper function to show error message
        const showError = (message) => {
            console.error(message);
            const errorDiv = document.createElement('div');
            errorDiv.className = 'bg-red-50 border-l-4 border-red-400 p-4 mb-6';
            errorDiv.innerHTML = `
                <div class='flex'>
                    <div class='flex-shrink-0'>
                        <svg class='h-5 w-5 text-red-400' xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='currentColor'>
                            <path fill-rule='evenodd' d='M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z' clip-rule='evenodd' />
                        </svg>
                    </div>
                    <div class='ml-3'>
                        <p class='text-sm text-red-700'>${message}</p>
                    </div>
                </div>
            `;
            document.querySelector('main').prepend(errorDiv);
        };

        // Format date to readable format
        const formatDate = (dateString) => {
            if (!dateString) return 'N/A';
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        };

        // Check if book is available
        const checkAvailability = (book) => {
            const statusElement = document.getElementById('availability-status');
            const checkoutBtn = document.getElementById('checkout-btn');
            
            if (!book.book_copies || book.book_copies.length === 0) {
                statusElement.innerHTML = `
                    <div class='inline-flex items-center text-red-600'>
                        <svg class='w-5 h-5 mr-2' fill='none' stroke='currentColor' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                            <path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z'></path>
                        </svg>
                        No copies available
                    </div>
                `;
                checkoutBtn.disabled = true;
                checkoutBtn.classList.add('opacity-50', 'cursor-not-allowed');
                return false;
            }
            
            const availableCopies = book.book_copies.filter(copy => copy.status === 'available');
            if (availableCopies.length > 0) {
                statusElement.innerHTML = `
                    <div class='inline-flex items-center text-green-600'>
                        <svg class='w-5 h-5 mr-2' fill='none' stroke='currentColor' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                            <path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M5 13l4 4L19 7'></path>
                        </svg>
                        ${availableCopies.length} ${availableCopies.length === 1 ? 'copy' : 'copies'} available
                    </div>
                `;
                checkoutBtn.disabled = false;
                checkoutBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                return true;
            } else {
                statusElement.innerHTML = `
                    <div class='inline-flex items-center text-red-600'>
                        <svg class='w-5 h-5 mr-2' fill='none' stroke='currentColor' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                            <path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 18L18 6M6 6l12 12'></path>
                        </svg>
                        Currently on loan
                    </div>
                `;
                checkoutBtn.disabled = true;
                checkoutBtn.classList.add('opacity-50', 'cursor-not-allowed');
                return false;
            }
        };

        // Handle book checkout
        const handleCheckout = async (bookId) => {
            try {
                const token = localStorage.getItem('auth_token');
                if (!token) {
                    sessionStorage.setItem('redirectAfterLogin', window.location.href);
                    window.location.href = '/login.html';
                    return;
                }

                const response = await fetch(`http://localhost:8000/api/checkout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ book_id: bookId })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Failed to checkout book');
                }

                // Show success message
                const statusElement = document.getElementById('availability-status');
                statusElement.innerHTML = `
                    <div class='bg-green-50 border-l-4 border-green-400 p-4 mb-4'>
                        <div class='flex'>
                            <div class='flex-shrink-0'>
                                <svg class='h-5 w-5 text-green-400' xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='currentColor'>
                                    <path fill-rule='evenodd' d='M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z' clip-rule='evenodd' />
                                </svg>
                            </div>
                            <div class='ml-3'>
                                <p class='text-sm text-green-700'>Successfully checked out! Due date: ${new Date(data.due_date).toLocaleDateString()}</p>
                            </div>
                        </div>
                    </div>
                `;
                
                // Disable checkout button after successful checkout
                const checkoutBtn = document.getElementById('checkout-btn');
                checkoutBtn.disabled = true;
                checkoutBtn.classList.add('opacity-50', 'cursor-not-allowed');
                
            } catch (error) {
                console.error('Checkout error:', error);
                showError(error.message || 'Failed to checkout book. Please try again.');
            }
        };

        // Load book details from API
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('DOM loaded, checking for book ID...');
            
            // Get and validate book ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const bookIdParam = urlParams.get('id');
            
            console.log('URL Params:', Object.fromEntries(urlParams.entries()));
            console.log('Book ID from URL:', bookIdParam);
            
            // Check if book ID exists and is valid
            if (!bookIdParam || bookIdParam === 'undefined' || bookIdParam === 'null') {
                return showError('No book ID specified. Please select a book from the library.');
            }
            
            // Convert to number and validate
            const bookId = Number(bookIdParam);
            if (isNaN(bookId) || bookId <= 0) {
                return showError('Invalid book ID. Please select a valid book.');
            }
            
            console.log('Validated Book ID:', bookId);
            
            const loadBookDetails = async () => {
                try {
                    // Check if user is authenticated
                    const token = localStorage.getItem('auth_token');
                    if (!token) {
                        // Redirect to login if not authenticated
                        sessionStorage.setItem('redirectAfterLogin', window.location.pathname + window.location.search);
                        window.location.href = '/login.html';
                        return;
                    }
                    
                    // Show loading state
                    document.getElementById('book-title').textContent = 'Loading...';
                    document.getElementById('book-description').textContent = 'Fetching book details...';
                    
                    // Set up the API URL and headers
                    const apiUrl = `http://localhost:8000/api/books/${bookId}`;
                    const headers = {
                        'Accept': 'application/json',
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    };
                    
                    console.log('Fetching book details from:', apiUrl);
                    
                    // Fetch book details with timeout
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
                    
                    let response;
                    try {
                        response = await fetch(apiUrl, {
                            method: 'GET',
                            headers: headers,
                            credentials: 'include',
                            signal: controller.signal
                        });
                        clearTimeout(timeoutId);
                    } catch (error) {
                        if (error.name === 'AbortError') {
                            throw new Error('Request timed out. Please check your connection and try again.');
                        }
                        throw error;
                    }

                    console.log('Response status:', response.status);
                    
                    if (response.status === 401) {
                        console.log('Not authenticated, redirecting to login');
                        window.location.href = 'login.html';
                        return;
                    }

                    // Store the response data first
                    const responseData = await response.json();
                    console.log('API Response:', responseData);
                    
                    if (!response.ok) {
                        throw new Error(responseData.message || `HTTP error! status: ${response.status}`);
                    }
                    
                    // Use the already parsed response data
                    const book = responseData.data || responseData;
                    console.log('Book data:', book);
                    
                    // Update the UI with book details
                    document.title = `${book.title} | Loverary`;
                    document.getElementById('book-title').textContent = book.title;
                    document.getElementById('book-author').innerHTML = `By <span class="font-medium">${book.author_name || 'Unknown Author'}</span>`;
                    document.getElementById('book-category').textContent = book.category || 'Uncategorized';
                    document.getElementById('book-description').textContent = book.summary || 'No description available.';
                    document.getElementById('publish-date').textContent = book.publication_year || 'N/A';
                    document.getElementById('page-count').textContent = book.pages || 'N/A';
                    document.getElementById('language').textContent = book.language || 'N/A';
                    document.getElementById('isbn').textContent = book.isbn || 'N/A';
                    
                    // Set book cover image with error handling and multiple fallbacks
                    const coverImage = document.getElementById('book-cover');
                    coverImage.alt = `Cover of ${book.title}`;
                    
                    // Try different possible image fields
                    const possibleImageFields = [
                        'cover_image_url',
                        'coverImageUrl',
                        'image_url',
                        'cover',
                        'image'
                    ];
                    
                    let imageUrl = null;
                    for (const field of possibleImageFields) {
                        if (book[field]) {
                            imageUrl = book[field];
                            console.log(`Found image URL in field '${field}':`, imageUrl);
                            break;
                        }
                    }
                    
                    // If no image URL found in the book data, use a placeholder
                    if (!imageUrl) {
                        console.log('No cover image URL found in book data, using placeholder');
                        coverImage.src = 'https://via.placeholder.com/300x450?text=No+Cover';
                        return;
                    }
                    
                    // Construct the correct image URL
                    const baseUrl = 'http://localhost:8000';
                    const imagePath = imageUrl.startsWith('/') ? imageUrl : `/${imageUrl}`;
                    const fullImageUrl = `${baseUrl}${imagePath}`;
                    
                    console.log('Loading book cover from:', fullImageUrl);
                    
                    // Try to load the image
                    const img = new Image();
                    img.onload = function() {
                        console.log('Book cover loaded successfully');
                        coverImage.src = fullImageUrl;
                    };
                    img.onerror = function() {
                        console.error('Error loading book cover, using placeholder');
                        // Fallback to a placeholder if the image fails to load
                        coverImage.src = 'https://via.placeholder.com/300x450?text=Cover+Not+Available';
                    };
                    img.src = fullImageUrl;
                    
                    // Check book availability and update UI
                    checkAvailability(book);
                    
                    // Setup checkout button
                    const checkoutBtn = document.getElementById('checkout-btn');
                    checkoutBtn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        checkoutBtn.disabled = true;
                        checkoutBtn.innerHTML = `
                            <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Processing...
                        `;
                        
                        await handleCheckout(bookId);
                        
                        // Reset button state
                        checkoutBtn.innerHTML = `
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                            Check Out This Book
                        `;
                    });
                    
                    // Setup add to shelf button
                    const addToShelfBtn = document.getElementById('add-to-shelf');
                    addToShelfBtn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        const originalText = addToShelfBtn.innerHTML;
                        
                        try {
                            addToShelfBtn.disabled = true;
                            addToShelfBtn.innerHTML = `
                                <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-gray-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Adding...
                            `;
                            
                            // Simulate API call (replace with actual implementation)
                            await new Promise(resolve => setTimeout(resolve, 1000));
                            
                            // Show success message
                            const statusElement = document.getElementById('availability-status');
                            statusElement.innerHTML = `
                                <div class='bg-green-50 border-l-4 border-green-400 p-4 mb-4'>
                                    <div class='flex'>
                                        <div class='flex-shrink-0'>
                                            <svg class='h-5 w-5 text-green-400' xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='currentColor'>
                                                <path fill-rule='evenodd' d='M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z' clip-rule='evenodd' />
                                            </svg>
                                        </div>
                                        <div class='ml-3'>
                                            <p class='text-sm text-green-700'>Book added to your shelf!</p>
                                        </div>
                                    </div>
                                </div>
                            `;
                            
                        } catch (error) {
                            console.error('Error adding to shelf:', error);
                            showError('Failed to add book to shelf. Please try again.');
                        } finally {
                            addToShelfBtn.disabled = false;
                            addToShelfBtn.innerHTML = originalText;
                        }
                    });
                    
                } catch (error) {
                    console.error('Error loading book details:', error);
                    showError(error.message || 'Failed to load book details. Please try again later.');
                }
            };
            
            // Load the book details
            loadBookDetails();
        });
    </script>
</body>
</html>
