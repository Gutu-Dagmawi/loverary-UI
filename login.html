<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>Login - Loverary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script type="module">
      import { redirectToHomeIfAuthenticated } from './src/utils/redirect.js';

      // Redirect to home if already logged in
      document.addEventListener('DOMContentLoaded', () => {
        redirectToHomeIfAuthenticated();
      });
    </script>
    <script type="module" src="./src/index.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <!-- Add loading indicator styles -->
    <style>
      .spinner {
        width: 1.5rem;
        height: 1.5rem;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Simple Header -->
    <header class="bg-white border-b border-gray-100">
      <div class="max-w-5xl mx-auto px-4 py-4">
        <a href="index.html" class="flex items-center gap-2">
          <span class="text-2xl">📚</span>
          <span class="text-xl font-medium text-gray-900">Loverary</span>
        </a>
      </div>
    </header>

    <!-- Minimal Login Form -->
    <main class="flex-1 flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-sm space-y-8 mx-auto">
        <div class="text-center">
          <h2 class="text-2xl font-semibold text-gray-900">Welcome back</h2>
          <p class="mt-1 text-sm text-gray-600">Sign in to your account</p>
        </div>

        <form
          id="loginForm"
          class="space-y-6"
          method="POST"
          novalidate
          onsubmit="event.preventDefault();"
        >
          <input type="hidden" name="_token" value="{{ csrf_token() }}" />
          <div class="space-y-4">
            <div>
              <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                Email
              </label>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-gray-400"
                placeholder="you@example.com"
              />
            </div>
            <div>
              <div class="flex items-center justify-between mb-1">
                <label for="password" class="block text-sm font-medium text-gray-700">
                  Password
                </label>
                <a href="#" class="text-xs text-gray-500 hover:text-gray-700"> Forgot password? </a>
              </div>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-gray-400"
                placeholder="••••••••"
              />
            </div>
          </div>

          <div class="flex items-center">
            <input
              id="remember-me"
              name="remember"
              type="checkbox"
              class="h-4 w-4 text-gray-600 focus:ring-gray-400 border-gray-300 rounded"
            />
            <label for="remember-me" class="ml-2 block text-sm text-gray-700"> Remember me </label>
          </div>

          <div>
            <button
              type="submit"
              class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-gray-900 hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition-colors"
            >
              <span id="loginButtonText">Sign in</span>
              <span id="loginSpinner" class="spinner hidden"></span>
            </button>
          </div>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
          Don't have an account?
          <a href="signup.html" class="font-medium text-gray-900 hover:text-gray-700"> Sign up </a>
        </p>
      </div>
    </main>
  </body>
</html>
