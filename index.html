<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loverary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            backgroundImage: {
              'gradient-hero': 'linear-gradient(120deg, #f6d365 0%, #fda085 100%)',
              'gradient-animated': 'linear-gradient(270deg, #f6d365, #fda085, #fbc2eb, #a1c4fd, #f6d365)',
            },
            boxShadow: {
              glass: '0 8px 32px 0 rgba(31, 38, 135, 0.18)',
            },
          },
        },
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="sticky top-0 z-20 bg-white/70 backdrop-blur border-b border-gray-200 shadow-sm">
      <div class="max-w-5xl mx-auto px-4 flex items-center justify-between h-16">
        <div class="flex items-center gap-2">
          <span class="text-xl">🔖</span>
          <span class="font-semibold text-lg tracking-tight">Loverary</span>
        </div>
        <div class="hidden md:flex gap-8 text-gray-700 font-medium">
          <a href="#" class="hover:text-blue-600 transition">Home</a>
          <a href="#" class="hover:text-blue-600 transition">Browse</a>
          <a href="#" class="hover:text-blue-600 transition">My Library</a>
        </div>
        <div class="flex items-center gap-3">
          <a href="#" class="hidden md:inline-block px-4 py-2 rounded-full bg-gradient-to-r from-orange-200 to-blue-200 hover:from-orange-300 hover:to-blue-300 text-gray-800 font-semibold shadow transition">Sign Up</a>
          <button class="p-2 rounded-full hover:bg-gray-100 transition md:ml-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.657A9.003 9.003 0 0 1 12 21c-4.97 0-9-4.03-9-9 0-4.97 4.03-9 9-9s9 4.03 9 9c0 1.306-.264 2.55-.743 3.687M15 19l2 2 4-4" />
            </svg>
          </button>
          <!-- Mobile menu button -->
          <button id="menu-btn" class="md:hidden p-2 rounded-full hover:bg-gray-100 transition ml-2" aria-label="Open menu">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
      <!-- Mobile menu -->
      <div id="mobile-menu" class="md:hidden hidden px-4 pb-4 bg-white/90 backdrop-blur shadow">
        <a href="#" class="block py-2 text-gray-700 font-medium hover:text-blue-600 transition">Home</a>
        <a href="#" class="block py-2 text-gray-700 font-medium hover:text-blue-600 transition">Browse</a>
        <a href="#" class="block py-2 text-gray-700 font-medium hover:text-blue-600 transition">My Library</a>
        <a href="#" class="block py-2 mt-2 rounded-full bg-gradient-to-r from-orange-200 to-blue-200 hover:from-orange-300 hover:to-blue-300 text-gray-800 font-semibold shadow text-center transition">Sign Up</a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center py-8 px-2">
      <!-- Login Card -->
      <section class="w-full max-w-lg min-h-[28rem] glass shadow-glass p-12 flex flex-col items-center animate-fade-in-up">
        <h1 class="text-2xl font-bold mb-8 text-center">Welcome to Loverary</h1>
        <form class="w-full flex flex-col gap-6 mt-8">
          <label class="sr-only" for="email">Email</label>
          <input id="email" type="email" placeholder="Email" class="w-full px-4 py-3 rounded-lg bg-white/60 focus:bg-white/80 focus:outline-none focus:ring-2 focus:ring-orange-200 focus:shadow-lg transition placeholder-gray-400 shadow" />
          <label class="sr-only" for="password">Password</label>
          <input id="password" type="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg bg-white/60 focus:bg-white/80 focus:outline-none focus:ring-2 focus:ring-orange-200 focus:shadow-lg transition placeholder-gray-400 shadow" />
          <button type="submit" class="w-full py-3 mt-4 rounded-full bg-black text-white text-lg font-bold shadow-xl transition-all duration-200 transform hover:scale-105 hover:shadow-2xl focus:outline-none focus:ring-2 focus:ring-gray-400">Login</button>
        </form>
      </section>
      <!-- Footer Link -->
      <div class="mt-6 text-center text-gray-600 text-sm animate-fade-in-up">
        Don&apos;t have an account? <a href="#" class="text-blue-600 hover:underline font-medium transition">Sign Up</a>
      </div>
    </main>
    <script>
      // Mobile menu toggle
      const menuBtn = document.getElementById('menu-btn');
      const mobileMenu = document.getElementById('mobile-menu');
      menuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
      });
    </script>
    <style>
      .animate-fade-in {
        opacity: 0;
        animation: fadeIn 1.2s ease 0.2s forwards;
      }
      .animate-fade-in-up {
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUp 1.2s cubic-bezier(.23,1.01,.32,1) 0.4s forwards;
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      @keyframes fadeInUp {
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </body>
</html>
